<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" width="220" height="52">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;display=swap');
    </style>
  </defs>

  <!-- Mark: bordered square with YA -->
  <rect x="0" y="6" width="40" height="40" rx="10" ry="10"
        fill="none" stroke="oklch(.86 .22 128)" stroke-width="2"/>
  <text x="20" y="33"
        font-family="Syne, sans-serif" font-weight="800" font-size="16"
        fill="oklch(.86 .22 128)" text-anchor="middle" letter-spacing="-0.5">YA</text>

  <!-- Wordmark: Yousef -->
  <text x="52" y="30"
        font-family="Syne, sans-serif" font-weight="800" font-size="20"
        fill="#f5f5f5" text-anchor="start" letter-spacing="-0.5">Yousef</text>

  <!-- Subtext: Abdallah -->
  <text x="53" y="43"
        font-family="Syne, sans-serif" font-weight="700" font-size="10"
        fill="rgba(245,245,245,0.38)" text-anchor="start" letter-spacing="2">ABDALLAH</text>
</svg>
